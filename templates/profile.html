{% extends "base.html" %}

{% block title %}Profile — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Your profile</h1>
            <p class="auth-subtitle">Account details</p>
        </div>

        <div class="auth-card profile-card">
            <div class="profile-row">
                <span class="profile-label">Username</span>
                <span class="profile-value">{{ user.username }}</span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Email</span>
                <span class="profile-value">{{ user.email }}</span>
            </div>
            <div class="profile-row">
                <span class="profile-label">Joined</span>
                <span class="profile-value">{{ user.created_at }}</span>
            </div>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('expenses_list') }}">Back to expenses</a>
        </p>

    </div>
</section>

{% endblock %}
